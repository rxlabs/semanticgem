---
name: Publish Ruby Gem

run-name: Publish ${{ github.ref_name }}

on:
  workflow_call:
    inputs:
      host:
        description: The gem release host.
        type: string
        required: true
      key:
        description: The gem release key.
        type: string
        required: true
      artifact_path:
        description: The path to gem to publish.
        type: string
        required: true
    secrets:
      token:
        description: The gem release token.
        required: true

jobs:
  gem:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup
        uses: ./.github/actions/setup
        with:
          install_dependencies: false
          gem_credentials: ':rubygems: ${{ secrets.TOKEN }}'
      - name: Download artifacts
        uses: actions/download-artifact@v3
        with:
          name: ${{ github.sha }}
          path: ${{ inputs.artifact_path }}/
      - name: Publish
        run: gem push --key $GEM_RELEASE_KEY --host $GEM_RELEASE_HOST $ARTIFACT_PATH/*
        env:
          GEM_RELEASE_KEY: ${{ inputs.key }}
          GEM_RELEASE_HOST: ${{ inputs.host }}
          ARTIFACT_PATH: ${{ inputs.artifact_path }}
