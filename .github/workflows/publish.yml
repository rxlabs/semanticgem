---
name: Publish version

run-name: Publish ${{ github.ref_name }}

on:
  push:
    tags:
      - v*

jobs:
  artifacts:
    name: Build artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup
        uses: ./.github/actions/setup
      - name: Build
        run: bundle exec rake build
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: ${{ github.sha }}
          path: |
            pkg/
  release:
    name: GitHub Releases
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: artifacts
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Download artifacts
        uses: actions/download-artifact@v3
        with:
          name: ${{ github.sha }}
          path: |
            pkg/
      - name: Setup Node.js
        uses: actions/setup-node@v3
      - name: Generate release notes
        id: changelog
        run: |
          mkdir tmp
          outfile=tmp/changelog.txt
          echo "outfile=${outfile}" >> $GITHUB_OUTPUT
          npx standard-changelog@^2.0.0 --release-count 2 --infile $outfile.tmp
          sed '1,7d' $outfile.tmp > $outfile
      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          token: ${{ secrets.GH_TOKEN }}
          body_path: ${{ github.workspace }}/${{ steps.changelog.outputs.outfile }}
          files: |
            pkg/*
          fail_on_unmatched_files: true
          prerelease: ${{ contains(github.ref_name, 'pre') }}
  rubygems:
    name: RubyGems.org
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: artifacts
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup
        uses: ./.github/actions/setup
      - name: Download artifacts
        uses: actions/download-artifact@v3
        with:
          name: ${{ github.sha }}
          path: |
            pkg/
  github:
    name: GitHub Packages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      packages: write
    needs: artifacts
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup
        uses: ./.github/actions/setup
      - name: Setup credentials
        run: |
          mkdir -p ~/.gem
          echo ":github: Bearer $TOKEN" > ~/.gem/credentials
          chmod 600 ~/.gem/credentials
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Download artifacts
        uses: actions/download-artifact@v3
        with:
          name: ${{ github.sha }}
          path: |
            pkg/
      - name: Publish
        run: bundle exec gem push pkg/*
        env:
          GEM_RELEASE_KEY: github
          GEM_RELEASE_HOST: https://rubygems.pkg.github.com/${{ github.repository_owner }}
