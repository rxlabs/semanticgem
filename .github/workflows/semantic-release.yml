---
name: Semantic release

on:
  push:
    branches:
      - '**'

jobs:
  semantic:
    name: Determine version
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      new_release_published: ${{ steps.release.outputs.new_release_published }}
      new_release_version: ${{ steps.release.outputs.new_release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Semantic release
        id: release
        uses: cycjimmy/semantic-release-action@v3
        with:
          dry_run: true
          semantic_version: '^19.0.0'
  release:
    name: Release version
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: semantic
    if: ${{ needs.semantic.outputs.new_release_published == 'true' }}
    steps:
      - name: Release version ${{ steps.release.outputs.new_release_version }} on ${{ github.ref_name }}
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.GH_TOKEN }}
          event-type: version
          client-payload: '{"version": "${{ needs.semantic.outputs.new_release_version }}", "branch": "${{ github.ref_name }}"}'
